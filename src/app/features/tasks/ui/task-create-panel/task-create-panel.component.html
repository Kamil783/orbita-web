<app-modal-overlay mode="panel" (close)="cancel.emit()">
    <header class="panel__header">
      <h3 class="panel__title">Новая задача</h3>
      <button class="panel__close" type="button" (click)="onCancel()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="panel__body">
      <div class="field">
        <label class="field__label">Название задачи</label>
        <input
          class="field__input"
          type="text"
          placeholder="Например: Уборка кухни"
          [(ngModel)]="title"
        />
      </div>

      <div class="field">
        <label class="field__label">Приоритет</label>
        <div class="segmented">
          @for (p of priorities; track p.value) {
            <button
              class="segmented__btn"
              [class.segmented__btn--active]="priority() === p.value"
              type="button"
              (click)="selectPriority(p.value)"
            >
              {{ p.label }}
            </button>
          }
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field__label">Срок</label>
          <app-date-picker [(ngModel)]="dueDate" placeholder="Выберите дату" />
        </div>

        <div class="field">
          <label class="field__label">Исполнители</label>
          <div class="assignee-dropdown" (click)="$event.stopPropagation()">
            <div
              class="assignee-dropdown__trigger"
              [class.assignee-dropdown__trigger--open]="assigneeDropdownOpen()"
              [class.assignee-dropdown__trigger--filled]="assigneeIds().length"
              (click)="toggleAssigneeDropdown()"
            >
              <span class="material-symbols-outlined assignee-dropdown__icon">group</span>
              @if (assigneeDropdownLabel()) {
                <span class="assignee-dropdown__value">{{ assigneeDropdownLabel() }}</span>
              } @else {
                <span class="assignee-dropdown__placeholder">Выбрать</span>
              }
              <span class="material-symbols-outlined assignee-dropdown__chevron">expand_more</span>
            </div>
            @if (assigneeDropdownOpen()) {
              <div class="assignee-dropdown__list">
                @for (a of assignees(); track a.id) {
                  <button
                    class="assignee-dropdown__option"
                    [class.assignee-dropdown__option--selected]="isAssigneeSelected(a.id)"
                    type="button"
                    (click)="toggleAssignee(a.id)"
                  >
                    @if (a.avatar) {
                      <img class="assignee-dropdown__avatar" [src]="a.avatar | avatar" [alt]="a.name" />
                    } @else {
                      <span class="assignee-dropdown__initial">{{ a.name.charAt(0).toUpperCase() }}</span>
                    }
                    <span class="assignee-dropdown__name">{{ a.name }}</span>
                    @if (isAssigneeSelected(a.id)) {
                      <span class="material-symbols-outlined assignee-dropdown__check">check</span>
                    }
                  </button>
                }
              </div>
            }
          </div>
        </div>
      </div>

      <div class="field">
        <label class="field__checkbox">
          <input
            type="checkbox"
            [checked]="trackProgress"
            (change)="trackProgress = $any($event.target).checked"
          />
          <span>Учитывать прогресс</span>
        </label>
      </div>

      <!-- ВАЖНО: добавили field--grow, чтобы "Описание" заполняло низ -->
      <div class="field field--grow">
        <label class="field__label">Описание</label>
        <textarea
          class="field__input field__textarea"
          placeholder="Добавьте детали задачи..."
          rows="4"
          [(ngModel)]="description"
        ></textarea>
      </div>
    </div>

    <footer class="panel__footer">
      <button class="btn btn--primary" type="button" (click)="onSave()">Сохранить</button>
      <button class="btn btn--secondary" type="button" (click)="onCancel()">Отмена</button>
    </footer>
</app-modal-overlay>
