<!-- Desktop: classic kanban -->
@if (!isMobile()) {
  <div class="board" cdkDropListGroup>
    @for (c of columns(); track c.id; let last = $last) {
      <app-kanban-column [column]="c" [showDivider]="true" (menuAction)="menuAction.emit($event)" (taskDrop)="taskDrop.emit($event)" (headerAction)="headerAction.emit($event)"></app-kanban-column>
    }

    <section class="newcol">
      <header class="newcol__hdr">
        <h3 class="newcol__title">Новая колонка</h3>
      </header>

      <button class="newcol__body" type="button" (click)="newColumn.emit()">
        <span class="material-symbols-outlined">add_box</span>
        <span class="newcol__text">Добавить секцию</span>
      </button>
    </section>
  </div>
}

<!-- Mobile: single column with tab selector -->
@if (isMobile()) {
  <div class="mobile-board">
    <div class="mobile-tabs">
      @for (c of columns(); track c.id; let i = $index) {
        <button
          class="mobile-tabs__btn"
          [class.mobile-tabs__btn--active]="activeColumnIndex() === i"
          (click)="selectColumn(i)"
        >
          <span class="mobile-tabs__label">{{ c.title }}</span>
          <span class="mobile-tabs__count">{{ c.totalCount }}</span>
        </button>
      }
    </div>

    @if (activeColumn(); as col) {
      <div class="mobile-column" cdkDropListGroup>
        <app-kanban-column
          [column]="col"
          (menuAction)="menuAction.emit($event)"
          (taskDrop)="taskDrop.emit($event)"
          (headerAction)="headerAction.emit($event)"
        ></app-kanban-column>
      </div>
    }
  </div>
}
